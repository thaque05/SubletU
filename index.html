// Reusable image component: supports multiple photos with tap-to-advance (like Tinder)
const ListingImage = ({ listing, className, style, showControls = false }) => {
  const [photoIdx, setPhotoIdx] = useState(0);
  const [imgLoaded, setImgLoaded] = useState({});
  const [imgError, setImgError] = useState({});
  const photos = listing.images || [];
  const total = photos.length;
  const currentSrc = photos[photoIdx] || "";

  const goNext = (e) => { e.stopPropagation(); if (photoIdx < total - 1) { setPhotoIdx(photoIdx + 1); } };
  const goPrev = (e) => { e.stopPropagation(); if (photoIdx > 0) { setPhotoIdx(photoIdx - 1); } };

  return (
    <div className={className} style={{ position: "relative", overflow: "hidden", background: listing.gradient, ...style }}>
      {!imgError[photoIdx] && currentSrc && (
        <img
          key={photoIdx}
          src={currentSrc}
          alt={listing.title || ""}
          draggable={false}
          onLoad={() => setImgLoaded(p => ({ ...p, [photoIdx]: true }))}
          onError={() => setImgError(p => ({ ...p, [photoIdx]: true }))}
          style={{
            position: "absolute", inset: 0, width: "100%", height: "100%",
            objectFit: "cover", opacity: imgLoaded[photoIdx] ? 1 : 0,
            transition: "opacity 0.3s ease"
          }}
        />
      )}
      {!imgLoaded[photoIdx] && <BuildingSVG />}
      {!imgLoaded[photoIdx] && (
        <div style={{
          position: "absolute", bottom: 12, left: 0, right: 0,
          textAlign: "center", color: "rgba(255,255,255,0.7)",
          fontSize: 12, fontWeight: 600, letterSpacing: 0.5
        }}>
          {listing.title}
        </div>
      )}
      {/* Tap zones for prev/next */}
      {showControls && total > 1 && (
        <>
          <div onClick={goPrev} style={{ position: "absolute", top: 0, left: 0, width: "35%", height: "100%", cursor: photoIdx > 0 ? "pointer" : "default", zIndex: 5 }} />
          <div onClick={goNext} style={{ position: "absolute", top: 60, right: 0, width: "35%", height: "calc(100% - 60px)", cursor: photoIdx < total - 1 ? "pointer" : "default", zIndex: 5 }} />
          {/* Dot indicators */}
          <div style={{ position: "absolute", top: 10, left: 0, right: 0, display: "flex", justifyContent: "center", gap: 5, zIndex: 6 }}>
            {photos.map((_, i) => (
              <div key={i} style={{
                width: i === photoIdx ? 20 : 8, height: 4, borderRadius: 2,
                background: i === photoIdx ? "white" : "rgba(255,255,255,0.45)",
                transition: "all 0.25s ease"
              }} />
            ))}
          </div>
        </>
      )}
    </div>
  );
};

const CSS = `
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&display=swap');

:root {

}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {

}

.app-shell {

}

/* ─── Header ─── */
.app-header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(251,248,244,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);

}

/* ─── Bottom Nav ─── */
.bottom-nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px; z-index: 100;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(20px);

  display: flex; padding: 8px 12px 24px;

/* ─── Swipe Card Stack ─── */
.card-stack {
  position: relative;
  width: 100%; height: calc(100vh - 320px);
  padding: 16px 16px 0;
}
.swipe-card {
  position: absolute;
  top: 16px; left: 16px; right: 16px;
  height: calc(100% - 16px);
  border-radius: var(--radius-xl);
  overflow: hidden;
  background: var(--bg-card);
  box-shadow: var(--shadow-lg);
  transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.4s;
  cursor: grab;
  user-select: none;
  touch-action: none;
}
.swipe-card:active { cursor: grabbing; }
.swipe-card { -webkit-touch-callout: none; -webkit-user-select: none; }
.swipe-card.swiping { transition: none; }
.swipe-card.exiting-left { transform: translateX(-110%) rotate(-12deg) !important; opacity: 0; transition: transform 0.3s ease-out, opacity 0.25s ease; }
.swipe-card.exiting-right { transform: translateX(110%) rotate(12deg) !important; opacity: 0; transition: transform 0.3s ease-out, opacity 0.25s ease; }
.swipe-card.no-transition { transition: none !important; }

  const [currentUser, setCurrentUser] = useState(null); // { name, email, university }
  const [authError, setAuthError] = useState("");

  // Load stored user on mount
  useEffect(() => {
    (async () => {
      try {
        if (window.storage) {
          const result = await window.storage.get("current-user");
          if (result?.value) {
            const user = JSON.parse(result.value);
            setCurrentUser(user); setAuthed(true);
          }
        } else {
          const stored = localStorage.getItem("subletu-current-user");
          if (stored) {
            const user = JSON.parse(stored);
            setCurrentUser(user); setAuthed(true);
          }
        }
      } catch (e) { /* no stored session */ }
    })();
  }, []);

  const saveUser = async (user) => {
    try {
      if (window.storage) {
        await window.storage.set("current-user", JSON.stringify(user));
      } else {
        localStorage.setItem("subletu-current-user", JSON.stringify(user));
      }
    } catch (e) { /* storage unavailable */ }
  };

  const registerUser = async (name, email, password, university) => {
    const key = `user:${email.toLowerCase()}`;
    try {
      if (window.storage) {
        try {
          const existing = await window.storage.get(key);
          if (existing?.value) { setAuthError("Account already exists. Sign in instead."); return false; }
        } catch (e) { /* key doesn't exist, good */ }
        const userData = { name, email, university, passwordHash: btoa(password), createdAt: new Date().toISOString() };
        await window.storage.set(key, JSON.stringify(userData));
      } else {
        const existing = localStorage.getItem(`subletu-${key}`);
        if (existing) { setAuthError("Account already exists. Sign in instead."); return false; }
        const userData = { name, email, university, passwordHash: btoa(password), createdAt: new Date().toISOString() };
        localStorage.setItem(`subletu-${key}`, JSON.stringify(userData));
      }
    } catch (e) { /* proceed anyway for demo */ }
    const user = { name, email, university };
    setCurrentUser(user);
    await saveUser(user);
    return true;
  };

    const key = `user:${email.toLowerCase()}`;

          userData = result?.value ? JSON.parse(result.value) : null;

      } else {
        const stored = localStorage.getItem(`subletu-${key}`);
        userData = stored ? JSON.parse(stored) : null;
      }
      if (!userData) { setAuthError("No account found. Create one first."); return false; }
      if (userData.passwordHash !== btoa(password)) { setAuthError("Incorrect password."); return false; }
      const user = { name: userData.name, email: userData.email, university: userData.university };
      setCurrentUser(user);
      await saveUser(user);
      return true;

      // Fallback for demo
      const user = { name: "Demo User", email, university: "Syracuse University" };
      setCurrentUser(user);
      await saveUser(user);
      return true;

    address: "", city: "", state: "", description: "", available: "",
    amenities: [], photos: [null, null, null, null, null, null]
  });
  const [myListings, setMyListings] = useState([]);
  const [postDrafts, setPostDrafts] = useState([]);
  const photoInputRef = useRef(null);

  // Map state
  const mapRef = useRef(null);
  const gMapRef = useRef(null);
  const markersRef = useRef([]);
  const circleRef = useRef(null);
  const [mapReady, setMapReady] = useState(false);
  const [mapError, setMapError] = useState(false);

  // Auth form
  const [authForm, setAuthForm] = useState({ email: "", password: "", name: "", university: "Syracuse University" });

  // Verification
  const [verifyStep, setVerifyStep] = useState(0);

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2500); };
  const cardRef = useRef(null);
  const startX = useRef(0);

  // Price helper: always show per-person price based on residents
  const getResidents = (listing) => listing.residents || listing.availableRooms || 1;
  const getEffectivePrice = (listing) => {
    const r = roommates > 1 ? roommates : getResidents(listing);
    return r > 1 ? Math.ceil(listing.price / r) : listing.price;
  };
  const getPriceSuffix = (listing) => {
    const r = roommates > 1 ? roommates : getResidents(listing);
    return r > 1 ? `/person` : `/mo`;
  };
  const priceLabel = (listing) => {
    const r = roommates > 1 ? roommates : getResidents(listing);
    const eff = getEffectivePrice(listing);
    if (r > 1) return `$${eff}/person · $${listing.price} total`;
    return `$${listing.price}/mo`;
  };
  const splitPrice = (listing) => getEffectivePrice(listing);

  // Shuffle listings on first load
  const shuffledRef = useRef(null);
  if (!shuffledRef.current) {
    const arr = [...SAMPLE_LISTINGS];
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    shuffledRef.current = arr;
  }
  // Include approved user listings in the pool
  const allListings = [...shuffledRef.current, ...myListings.filter(l => l.status === "approved").map(l => ({
    ...l, price: parseInt(l.price) || 0, bedrooms: parseInt(l.bedrooms) || 0,
    bathrooms: parseInt(l.bathrooms) || 0, rooms: parseInt(l.rooms) || 0,
    availableRooms: parseInt(l.availableRooms) || 1, residents: parseInt(l.residents) || 1,
    city: l.city || "Syracuse", state: l.state || "NY", distance: 0.5, lat: 43.038, lng: -76.135,
    images: l.photos?.filter(Boolean) || [],
    gradient: "linear-gradient(135deg, #D4603A 0%, #E8956E 50%, #F2D4C7 100%)",
    amenities: l.amenities || [],
    poster: { name: currentUser?.name || "You", university: currentUser?.university || "Syracuse University", verified: true, avatar: (currentUser?.name || "Y").split(" ").map(w => w[0]).join(""), rating: 5.0, reviews: 0, bio: currentUser?.bio || "" },
    available: l.available || "TBD", posted: "Just now"
  }))];

  // Filtered listings (excludes already swiped)
  const filteredListings = allListings.filter(l => {
    if (savedListings.find(s => s.id === l.id)) return false;
    if (passedListings.includes(l.id)) return false;
    if (bedroomFilter !== "any" && l.bedrooms !== parseInt(bedroomFilter)) return false;
    if (bathroomFilter !== "any" && l.bathrooms !== parseInt(bathroomFilter)) return false;
    if (priceMax !== null) { const effectiveP = roommates > 1 ? Math.ceil(l.price / roommates) : (l.residents > 1 ? Math.ceil(l.price / l.residents) : l.price); if (effectiveP > priceMax) return false; }
    if (l.distance > radius) return false;
    if (selectedAmenities.length > 0 && !selectedAmenities.every(a => l.amenities.includes(a))) return false;
    if (roommates > 1 && l.availableRooms < roommates) return false;
    return true;
  });
  const mapListings = allListings.filter(l => {
    if (bedroomFilter !== "any" && l.bedrooms !== parseInt(bedroomFilter)) return false;
    if (bathroomFilter !== "any" && l.bathrooms !== parseInt(bathroomFilter)) return false;
    if (priceMax !== null) { const effectiveP = roommates > 1 ? Math.ceil(l.price / roommates) : (l.residents > 1 ? Math.ceil(l.price / l.residents) : l.price); if (effectiveP > priceMax) return false; }
    if (l.distance > radius) return false;
    if (selectedAmenities.length > 0 && !selectedAmenities.every(a => l.amenities.includes(a))) return false;
    if (roommates > 1 && l.availableRooms < roommates) return false;
    return true;
  });

  // ─── Google Maps ───
  useEffect(() => {
    if (window.google?.maps) { setMapReady(true); return; }
    if (document.querySelector('script[src*="maps.googleapis.com"]')) return;
    const script = document.createElement("script");
    script.src = "https://maps.googleapis.com/maps/api/js?key=AIzaSyBDPZiyRvIWoXf5BRLdoGuvvHG7EEiJJv4&callback=__gmapReady";
    script.async = true; script.defer = true;
    window.__gmapReady = () => { setMapReady(true); delete window.__gmapReady; };
    script.onerror = () => setMapError(true);
    document.head.appendChild(script);
  }, []);

  // Geocode addresses via Nominatim (free, no API key needed)
  const geocacheRef = useRef({});
  const geocodeAddress = (address, city, state) => {
    const key = `${address}, ${city}, ${state}`;
    if (geocacheRef.current[key]) return Promise.resolve(geocacheRef.current[key]);
    const q = encodeURIComponent(`${address}, ${city}, ${state}`);
    return fetch(`https://nominatim.openstreetmap.org/search?q=${q}&format=json&limit=1`, {
      headers: { "Accept": "application/json" }
    })
      .then(r => r.json())
      .then(data => {
        if (data && data[0]) {
          const coords = { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
          geocacheRef.current[key] = coords;
          console.log("Geocoded:", key, "→", coords);
          return coords;
        }
        console.warn("Geocode failed for:", key);
        return null;
      })
      .catch(e => { console.warn("Geocode error:", key, e); return null; });
  };

  // Clean up map when leaving
  useEffect(() => {
    if (view !== "map" && gMapRef.current) {
      gMapRef.current = null;
      markersRef.current = [];
      circleRef.current = null;
    }
  }, [view]);

  // Initialize/update map
  useEffect(() => {
    if (!mapReady || !mapRef.current || !window.google?.maps) return;
    if (view !== "map") return;

    const center = { lat: 43.0420, lng: -76.1340 };

    if (!gMapRef.current) {
      gMapRef.current = new window.google.maps.Map(mapRef.current, {
        center, zoom: 15,
        mapTypeControl: false, streetViewControl: false, fullscreenControl: false,
        gestureHandling: "greedy",
        styles: [
          { featureType: "poi.business", stylers: [{ visibility: "off" }] },
          { featureType: "transit", elementType: "labels.icon", stylers: [{ visibility: "off" }] },
        ]
      });
    }

    // Clear old markers
    markersRef.current.forEach(m => m.setMap(null));
    markersRef.current = [];
    if (circleRef.current) circleRef.current.setMap(null);

    // Radius circle
    circleRef.current = new window.google.maps.Circle({
      map: gMapRef.current, center, radius: radius * 1609.34,
      fillColor: "#D4603A", fillOpacity: 0.04,
      strokeColor: "#D4603A", strokeWeight: 1.5, strokeOpacity: 0.25,
      clickable: false
    });

    const bounds = new window.google.maps.LatLngBounds();
    bounds.extend(center);
    let pendingGeocode = 0;

    const addMarker = (l, pos) => {
      const marker = new window.google.maps.Marker({
        map: gMapRef.current,
        position: pos,
        title: l.title,
        icon: {
          url: "data:image/svg+xml," + encodeURIComponent(
            `<svg xmlns="http://www.w3.org/2000/svg" width="70" height="30">` +
            `<rect rx="12" width="70" height="28" fill="#D4603A" stroke="white" stroke-width="2"/>` +
            `<text x="35" y="19" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="12" fill="white">$${splitPrice(l)}</text></svg>`
          ),
          scaledSize: new window.google.maps.Size(70, 30),
          anchor: new window.google.maps.Point(35, 15)
        }
      });
      const info = new window.google.maps.InfoWindow({
        content: `<div style="font-family:'DM Sans',Arial,sans-serif;min-width:200px;padding:4px;">` +
          `<div style="font-weight:700;font-size:15px;margin-bottom:4px;">${l.title}</div>` +
          `<div style="color:#D4603A;font-weight:600;font-size:14px;">$${splitPrice(l)}${getPriceSuffix(l)}</div>` +
          `<div style="font-size:12px;color:#666;margin-top:4px;">${l.address}, ${l.city || "Syracuse"}</div>` +
          `<div style="font-size:12px;color:#666;">${l.bedrooms === 0 ? "Studio" : l.bedrooms + " bed"} \u00b7 ${l.bathrooms} bath \u00b7 ${l.availableRooms} avail</div>` +
          `<div style="margin-top:10px;"><button onclick="window.__openListing(${l.id})" style="` +
          `background:#D4603A;color:white;border:none;padding:8px 16px;border-radius:8px;` +
          `font-size:13px;font-weight:600;cursor:pointer;width:100%;">View Details</button></div></div>`
      });
      marker.addListener("click", () => {
        markersRef.current.forEach(m => m._info?.close());
        info.open(gMapRef.current, marker);
      });
      marker._info = info;
      markersRef.current.push(marker);
      bounds.extend(pos);
    };

    // Geocode all addresses via Nominatim (staggered 1/sec to respect rate limit)
    let placed = 0;
    const total = mapListings.length;
    mapListings.forEach((l, i) => {
      // Stagger requests: cached ones resolve instantly, uncached wait i*1100ms
      const cachedKey = `${l.address}, ${l.city || "Syracuse"}, ${l.state || "NY"}`;
      const isCached = !!geocacheRef.current[cachedKey];
      const delay = isCached ? 0 : i * 1100;
      
      setTimeout(() => {
        geocodeAddress(l.address, l.city || "Syracuse", l.state || "NY").then(pos => {
          const finalPos = pos || { lat: l.lat || 43.04, lng: l.lng || -76.13 };
          addMarker(l, finalPos);
          placed++;
          if (placed === total && gMapRef.current) {
            gMapRef.current.fitBounds(bounds, 50);
          }
        });
      }, delay);
    });

    window.__openListing = (id) => {
      const found = allListings.find(l => l.id === id);
      if (found) setDetailListing(found);
    };
  }, [mapReady, mapListings.length, radius, roommates, view]);

  // Update radius circle
  useEffect(() => {
    if (circleRef.current) circleRef.current.setRadius(radius * 1609.34);
  }, [radius]);

  // ─── Message send helper ───
  const sendMessage = (listing, text) => {
    const newMsg = {
      id: Date.now(), from: "You", to: listing.poster.name,
      listingTitle: listing.title, listingId: listing.id,
      text, time: "Just now", read: true
    };
    setMessages(prev => [...prev, newMsg]);
    showToast("💬 Message sent — check Messages tab");
  };

  const defaultMsgText = (listing) => `Hi! I'm interested in ${listing.title}. Is it still available?`;

  // ─── Swipe handlers ───
  const handlePointerDown = (e) => {
    startX.current = e.clientX;
    setSwipeState(s => ({ ...s, swiping: true }));
  };
  const handlePointerMove = (e) => {
    if (!swipeState.swiping) return;
    const dx = e.clientX - startX.current;
    setSwipeState(s => ({ ...s, x: dx }));
  };
  const advanceCard = () => {
    setJustAdvanced(true);
    setSwipeState({ x: 0, swiping: false, exiting: null });
    setCurrentCard(c => c + 1);
    setTimeout(() => setJustAdvanced(false), 80);
  };

  const handlePointerUp = () => {
    if (!swipeState.swiping) return;
    const threshold = 100;
    const listing = filteredListings[0];
    if (swipeState.x > threshold && listing) {
      setSwipeState(s => ({ ...s, swiping: false, exiting: "right" }));
      showToast("Saved to your list!");
      setTimeout(() => {
        if (!savedListings.find(l => l.id === listing.id)) {
          setSavedListings(prev => [...prev, listing]);
        }
        setSwipeState({ x: 0, swiping: false, exiting: null });
        setJustAdvanced(true);
        setTimeout(() => setJustAdvanced(false), 80);
      }, 320);
    } else if (swipeState.x < -threshold && listing) {
      setSwipeState(s => ({ ...s, swiping: false, exiting: "left" }));
      showToast("Passed");
      setTimeout(() => {
        setPassedListings(prev => [...prev, listing.id]);
        setSwipeState({ x: 0, swiping: false, exiting: null });
        setJustAdvanced(true);
        setTimeout(() => setJustAdvanced(false), 80);
      }, 320);
    } else {
      setSwipeState({ x: 0, swiping: false, exiting: null });
    }
  };

  const handleActionBtn = (action) => {
    const listing = filteredListings[0];
    if (!listing) return;
    if (action === "like") {
      setSwipeState({ x: 0, swiping: false, exiting: "right" });
      showToast("Saved to your list!");
      setTimeout(() => {
        if (!savedListings.find(l => l.id === listing.id)) setSavedListings(prev => [...prev, listing]);
        setSwipeState({ x: 0, swiping: false, exiting: null });
        setJustAdvanced(true);
        setTimeout(() => setJustAdvanced(false), 80);
      }, 320);
    } else if (action === "pass") {
      setSwipeState({ x: 0, swiping: false, exiting: "left" });
      showToast("Passed");
      setTimeout(() => {
        setPassedListings(prev => [...prev, listing.id]);
        setSwipeState({ x: 0, swiping: false, exiting: null });
        setJustAdvanced(true);
        setTimeout(() => setJustAdvanced(false), 80);
      }, 320);
    } else if (action === "msg") {
      // Auto-save when messaging
      if (!savedListings.find(l => l.id === listing.id)) {
        setSavedListings(prev => [...prev, listing]);
      }
      setMsgCompose({ listing });
      setCustomMsgInput("");
      return;
    }
  };

  const togglePostAmenity = (a) => {
    setPostForm(f => ({
      ...f,
      amenities: f.amenities.includes(a)
        ? f.amenities.filter(x => x !== a)
        : [...f.amenities, a]
    }));
  };

  // ─── Auth Screen ───
  if (!authed) {
    return (
      <div className="app-shell">
        <style>{CSS}</style>
        <div className="auth-screen">
          <div className="auth-logo">Sublet<span>U</span></div>
          <div className="auth-tagline">Verified university sublets. Swipe, match, move in.</div>

          {authMode === "verify" ? (
            <div style={{ width: "100%", maxWidth: 340 }}>
              <div style={{ fontFamily: "var(--font-display)", fontSize: 24, fontWeight: 600, marginBottom: 4 }}>
                Verify Your Identity
              </div>
              <p style={{ fontSize: 14, color: "var(--text-secondary)", marginBottom: 28 }}>
                We keep our community safe with strict verification.
              </p>
              <div className="settings-card" style={{ textAlign: "left" }}>
                <div className="verify-step">
                  <div className={`step-number ${verifyStep > 0 ? "completed" : "active"}`}>
                    {verifyStep > 0 ? "✓" : "1"}
                  </div>
                  <div className="step-content">
                    <div className="step-title">University Email (.edu)</div>
                    <div className="step-desc">Confirm you're a current student</div>
                  </div>
                </div>
                <div className="verify-step">
                  <div className={`step-number ${verifyStep > 1 ? "completed" : verifyStep === 1 ? "active" : ""}`}>
                    {verifyStep > 1 ? "✓" : "2"}
                  </div>
                  <div className="step-content">
                    <div className="step-title">Student ID Upload</div>
                    <div className="step-desc">Photo of your valid university ID</div>
                  </div>
                </div>
                <div className="verify-step">
                  <div className={`step-number ${verifyStep > 2 ? "completed" : verifyStep === 2 ? "active" : ""}`}>
                    {verifyStep > 2 ? "✓" : "3"}
                  </div>
                  <div className="step-content">
                    <div className="step-title">Selfie Verification</div>
                    <div className="step-desc">Live photo match with your ID</div>
                  </div>
                </div>
                <div className="verify-step">
                  <div className={`step-number ${verifyStep > 3 ? "completed" : verifyStep === 3 ? "active" : ""}`}>
                    {verifyStep > 3 ? "✓" : "4"}
                  </div>
                  <div className="step-content">
                    <div className="step-title">Phone Verification</div>
                    <div className="step-desc">SMS code to confirm your number</div>
                  </div>
                </div>
              </div>
              <button className="btn-primary" onClick={() => {
                if (verifyStep < 3) {
                  setVerifyStep(s => s + 1);
                } else {
                  setVerifyStep(4);
                  setTimeout(() => { setAuthed(true); showToast("Welcome! You're verified."); }, 600);
                }
              }}>
                {verifyStep < 3 ? "Complete Step " + (verifyStep + 1) : "Finish Verification"}
              </button>
              <div style={{ marginTop: 12 }}>
                <button style={{ background: "none", border: "none", color: "var(--text-tertiary)", cursor: "pointer", fontSize: 13, fontFamily: "var(--font-body)" }}
                  onClick={() => { setAuthed(true); showToast("Signed in (demo mode)"); }}>
                  Skip for demo →
                </button>
              </div>
            </div>
          ) : (
            <div className="auth-form">
              {authError && (
                <div style={{
                  padding: "10px 14px", borderRadius: "var(--radius-sm)",
                  background: "var(--danger-light)", color: "var(--danger)",
                  fontSize: 13, marginBottom: 12, textAlign: "left"
                }}>{authError}</div>
              )}
              {authMode === "register" && (
                <input className="form-input" placeholder="Full name"
                  value={authForm.name} onChange={e => { setAuthForm(f => ({ ...f, name: e.target.value })); setAuthError(""); }} />
              )}
              <input className="form-input" placeholder="University email (.edu)"
                value={authForm.email} onChange={e => { setAuthForm(f => ({ ...f, email: e.target.value })); setAuthError(""); }} />
              <input className="form-input" type="password" placeholder="Password"
                value={authForm.password} onChange={e => { setAuthForm(f => ({ ...f, password: e.target.value })); setAuthError(""); }} />
              {authMode === "register" && (
                <select className="form-select" style={{ marginBottom: 12 }}
                  value={authForm.university} onChange={e => setAuthForm(f => ({ ...f, university: e.target.value }))}>
                  {UNIVERSITIES.map(u => <option key={u}>{u}</option>)}
                </select>
              )}
              <button className="btn-primary" onClick={async () => {
                setAuthError("");
                if (!authForm.email || !authForm.password) { setAuthError("Please fill in all fields."); return; }
                if (authMode === "register") {
                  if (!authForm.name) { setAuthError("Please enter your name."); return; }
                  if (!authForm.email.includes(".edu")) { setAuthError("Please use a .edu email address."); return; }
                  const ok = await registerUser(authForm.name, authForm.email, authForm.password, authForm.university);
                  if (ok) { setAuthed(true); showToast("Account created! Welcome to SubletU."); }
                } else {
                  const ok = await loginUser(authForm.email, authForm.password);
                  if (ok) { setAuthed(true); showToast("Welcome back!"); }
                }
              }}>
                {authMode === "login" ? "Sign In" : "Create Account"}
              </button>
              <div className="auth-divider">or</div>
              <div className="auth-switch">
                {authMode === "login" ? "New here? " : "Already have an account? "}
                <button onClick={() => { setAuthMode(authMode === "login" ? "register" : "login"); setAuthError(""); }}>
                  {authMode === "login" ? "Create account" : "Sign in"}
                </button>
              </div>
            </div>
          )}

          <div className="security-features">
            <div className="sec-feat">
              <div className="sec-feat-icon">{Icons.shield({ size: 16 })}</div>
              <span>.edu email verification required for all users</span>
            </div>
            <div className="sec-feat">
              <div className="sec-feat-icon">{Icons.eye({ size: 16 })}</div>
              <span>AI-powered selfie + ID match prevents fake accounts</span>
            </div>
            <div className="sec-feat">
              <div className="sec-feat-icon">{Icons.lock({ size: 16 })}</div>
              <span>End-to-end encrypted messages between users</span>
            </div>
            <div className="sec-feat">
              <div className="sec-feat-icon">{Icons.info({ size: 16 })}</div>
              <span>Fraud detection flags suspicious listings automatically</span>
            </div>
          </div>
        </div>
        {toast && <div className="toast">{toast}</div>}
      </div>
    );
  }

  // ─── Detail Modal ───
  // Detail modal is inlined in the return JSX to prevent remount on scroll

  // ─── Views ───
  const renderBrowse = () => {
    const listing = filteredListings[0];
    if (!listing) {
      return (
        <div className="empty-state">
          <div className="empty-state-icon">{Icons.search({ size: 48 })}</div>
          <div className="empty-state-title">No more listings</div>
          <p style={{ fontSize: 14 }}>Check back later or adjust your filters</p>
          <button className="btn-secondary" style={{ width: "auto", marginTop: 16, padding: "10px 24px" }}
            onClick={() => { setCurrentCard(0); setView("settings"); }}>
            Adjust Filters
          </button>
        </div>
      );
    }
    const rotation = swipeState.x * 0.05;
    const likeOpacity = Math.min(swipeState.x / 100, 1);
    const passOpacity = Math.min(-swipeState.x / 100, 1);
    
    return (
      <div className="page" style={{ paddingBottom: 100 }}>
        {/* Roommate selector bar */}
        <div className="roommate-bar">
          <span className="roommate-bar-label">Splitting:</span>
          <div className="roommate-options">
            {[1, 2, 3, 4, 5].map(n => (
              <button key={n} className={`roommate-btn ${roommates === n ? "active" : ""}`}
                onClick={() => { setRoommates(n); setCurrentCard(0); }}>
                {n === 1 ? "Solo" : `${n}`}
              </button>
            ))}
          </div>
        </div>
        <div className="card-stack">
          <div
            key={listing?.id || "card"}
            className={`swipe-card ${justAdvanced ? "no-transition" : ""} ${swipeState.swiping ? "swiping" : ""} ${swipeState.exiting === "left" ? "exiting-left" : ""} ${swipeState.exiting === "right" ? "exiting-right" : ""}`}
            style={{ transform: swipeState.exiting ? undefined : `translateX(${swipeState.x}px) rotate(${rotation}deg)` }}
            onPointerDown={handlePointerDown}
            onPointerMove={handlePointerMove}
            onPointerUp={handlePointerUp}
            onPointerLeave={handlePointerUp}
          >
            <ListingImage listing={listing} className="card-image" showControls={true} />
            <div className="card-gradient" />
            <div className="card-badges">
              <span className="card-badge badge-price">
                ${getEffectivePrice(listing)}<span style={{ fontSize: 11, fontWeight: 400 }}>{getPriceSuffix(listing)}</span>
              </span>
              {(roommates > 1 || listing.availableRooms > 1) && (
                <span className="card-badge badge-new" style={{ background: "rgba(255,255,255,0.25)" }}>
                  {roommates > 1 ? `÷${roommates}` : `÷${listing.availableRooms}`}
                </span>
              )}
              {listing.posted.includes("Just") || listing.posted.includes("hour") ?
                <span className="card-badge badge-new">New</span> : null}
            </div>
            <button className="card-bookmark" title="Bookmark this listing"
              onPointerDown={e => e.stopPropagation()}
              onClick={e => {
              e.stopPropagation();

  const handlePhotoUpload = (e) => {
    const files = Array.from(e.target.files);
    if (!files.length) return;
    
    // Read all files, then batch-update state once all are loaded
    const readers = files.map(file => {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (ev) => resolve(ev.target.result);
        reader.readAsDataURL(file);
      });
    });

    Promise.all(readers).then(dataUrls => {
      setPostForm(f => {
        const newPhotos = [...f.photos];
        let slot = newPhotos.findIndex(p => p === null); // first empty slot
        dataUrls.forEach(url => {
          if (slot === -1 || slot >= 6) return;
          newPhotos[slot] = url;
          // find next empty
          slot = newPhotos.findIndex((p, idx) => idx > slot && p === null);
          if (slot === -1) slot = newPhotos.indexOf(null);
        });
        return { ...f, photos: newPhotos };
      });
    });

    e.target.value = "";
  };

          if (!postForm.title || !postForm.price || !postForm.address) {
            showToast("Please fill in title, price, and address"); return;
          }
          
          // ─── LOCAL SPAM DETECTION ALGORITHM ───
          const t = postForm.title.toLowerCase();
          const d = (postForm.description || "").toLowerCase();
          const a = postForm.address.toLowerCase();
          const price = parseInt(postForm.price) || 0;
          const spamWords = ["money","free","cash","quick","dm me","click","win","deal","scam","hack","crypto","bet","loan","venmo","paypal","zelle","gift card","wire","transfer"];
          const capsRatio = (postForm.title.replace(/[^A-Z]/g,"").length) / Math.max(postForm.title.replace(/\s/g,"").length, 1);
          const fakeAddrWords = ["cash","money","fake","nowhere","test","asdf","xxx","lol"];
          
          let rejected = false;
          let reason = "";
          
          // Check spam words in title
          if (spamWords.some(w => t.includes(w))) { rejected = true; reason = "Title contains spam/scam language"; }
          // Check mostly caps title (>60% caps and >5 chars)
          else if (capsRatio > 0.6 && postForm.title.length > 5) { rejected = true; reason = "Title appears to be spam (excessive caps)"; }
          // Check fake address
          else if (fakeAddrWords.some(w => a.includes(w))) { rejected = true; reason = "Address appears to be fake"; }
          // Check price
          else if (price < 200) { rejected = true; reason = "Price too low for a real sublet ($" + price + "/mo)"; }

                onClick={() => setBathroomFilter(v)}>
                {v === "any" ? "Any" : v}
              </button>
            ))}
          </div>
        </div>
        <div className="form-section" style={{ marginBottom: 0 }}>
          <label className="form-label">Required Amenities</label>
          <div className="chip-grid">
            {AMENITIES_LIST.map(a => (
              <button key={a} className={`chip ${selectedAmenities.includes(a) ? "selected" : ""}`}
                onClick={() => setSelectedAmenities(prev =>
                  prev.includes(a) ? prev.filter(x => x !== a) : [...prev, a]
                )}>
                {a}
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* Security */}
      <div className="settings-card">
        <div className="settings-card-title">Security & Privacy</div>
        <div className="toggle-row">
          <div>
            <div className="toggle-label">Push Notifications</div>
            <div className="toggle-desc">New matches and messages</div>
          </div>
          <button className={`toggle-switch ${notifications ? "on" : ""}`}
            onClick={() => setNotifications(!notifications)} />
        </div>
        <div className="toggle-row">
          <div>
            <div className="toggle-label">Show on Map</div>
            <div className="toggle-desc">Let others see your listings on map</div>
          </div>
          <button className={`toggle-switch ${showOnMap ? "on" : ""}`}
            onClick={() => setShowOnMap(!showOnMap)} />
        </div>
        <div className="toggle-row" style={{ borderBottom: "none" }}>
          <div>
            <div className="toggle-label">Auto-Verify New Devices</div>
            <div className="toggle-desc">Require 2FA on new logins</div>
          </div>
          <button className={`toggle-switch ${autoVerify ? "on" : ""}`}
            onClick={() => setAutoVerify(!autoVerify)} />
        </div>
      </div>

      {/* Verification Status */}
      <div className="settings-card">
        <div className="settings-card-title">Verification Status</div>
        {["Email Verified (.edu)", "Student ID Confirmed", "Selfie Match Complete", "Phone Verified"].map((step, i) => (
          <div key={i} className="verify-step">
            <div className="step-number completed">✓</div>
            <div className="step-content">
              <div className="step-title">{step}</div>
            </div>
          </div>
        ))}
      </div>

      {/* My Listings */}
      <div className="settings-card">
        <div className="settings-card-title">My Listings</div>
        {myListings.length === 0 ? (
          <p style={{ fontSize: 13, color: "var(--text-tertiary)", padding: "8px 0" }}>
            No listings yet. Post a sublet with the + button above.
          </p>
        ) : (
          myListings.map((listing, i) => (
            <div key={listing.id} style={{
              padding: "12px 0", borderBottom: i < myListings.length - 1 ? "1px solid var(--border)" : "none"
            }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 600, fontSize: 14 }}>{listing.title}</div>
                  <div style={{ fontSize: 12, color: "var(--text-secondary)", marginTop: 2 }}>
                    {listing.address} · ${listing.price}/mo · {listing.bedrooms} bed/{listing.bathrooms} bath
                  </div>
                  {listing.available && (
                    <div style={{ fontSize: 11, color: "var(--text-tertiary)", marginTop: 2 }}>{listing.available}</div>
                  )}
                  {listing.description && (
                    <div style={{ fontSize: 12, color: "var(--text-tertiary)", marginTop: 4, lineHeight: 1.4 }}>
                      {listing.description.length > 80 ? listing.description.slice(0, 80) + "..." : listing.description}
                    </div>
                  )}
                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginTop: 6 }}>
                    {listing.amenities?.slice(0, 4).map(a => (
                      <span key={a} style={{ fontSize: 10, padding: "2px 8px", borderRadius: 10, background: "var(--bg-elevated)", color: "var(--text-tertiary)" }}>{a}</span>
                    ))}
                    {listing.amenities?.length > 4 && (
                      <span style={{ fontSize: 10, color: "var(--text-tertiary)" }}>+{listing.amenities.length - 4} more</span>
                    )}
                  </div>
                </div>
                <div style={{
                  padding: "4px 10px", borderRadius: 10, fontSize: 11, fontWeight: 600,
                  background: listing.status === "approved" ? "var(--success-light)" : listing.status === "rejected" ? "var(--danger-light)" : "var(--accent-light)",
                  color: listing.status === "approved" ? "var(--success)" : listing.status === "rejected" ? "var(--danger)" : "var(--accent)",
                  textTransform: "capitalize", flexShrink: 0, marginLeft: 10
                }}>
                  {listing.status === "reviewing" ? "AI Reviewing..." : listing.status === "pending" ? "Under Review" : listing.status}
                </div>
              </div>
              {listing.reviewNote && (
                <div style={{ fontSize: 11, color: listing.status === "approved" ? "var(--success)" : "var(--danger)", marginTop: 4, fontStyle: "italic" }}>
                  AI: {listing.reviewNote}
                </div>
              )}
              {listing.photoCount > 0 && (
                <div style={{ fontSize: 11, color: "var(--text-tertiary)", marginTop: 4 }}>
                  📷 {listing.photoCount} photo{listing.photoCount !== 1 ? "s" : ""}
                </div>
              )}
            </div>
          ))
        )}
      </div>

      <button className="btn-secondary" style={{ marginBottom: 12, color: "var(--danger)", borderColor: "var(--danger)" }}
        onClick={logoutUser}>
        Sign Out
      </button>
    </div>
  );

  const renderMessages = () => {
    const grouped = {};
    messages.forEach(m => {
      const other = m.from === "You" ? m.to : m.from;
      if (!grouped[other]) grouped[other] = { name: other, listing: m.listingTitle, listingId: m.listingId, msgs: [] };
      grouped[other].msgs.push(m);
    });
    const convos = Object.values(grouped);
    // Sort by most recent message first
    convos.sort((a, b) => {
      const aLast = a.msgs[a.msgs.length - 1];
      const bLast = b.msgs[b.msgs.length - 1];
      return bLast.id - aLast.id;
    });

    // Open chat view
    if (openChat) {
      const convo = convos.find(c => c.name === openChat);
      if (!convo) { setOpenChat(null); return null; }
      const initial = convo.name.split(" ").map(w => w[0]).join("");
      return (
        <div className="page" style={{ display: "flex", flexDirection: "column", paddingBottom: 70 }}>
          {/* Chat header */}
          <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16 }}>
            <button className="icon-btn" onClick={() => setOpenChat(null)} style={{ flexShrink: 0 }}>
              {Icons.chevLeft({ size: 18 })}
            </button>
            <div className="poster-avatar" style={{ width: 38, height: 38, fontSize: 13, flexShrink: 0, cursor: "pointer" }}
              onClick={() => {
                const found = SAMPLE_LISTINGS.find(l => l.poster.name === convo.name);
                if (found) setProfileView(found.poster);
              }}>{initial}</div>
            <div style={{ minWidth: 0 }}>
              <div style={{ fontWeight: 600, fontSize: 15, cursor: "pointer", color: "var(--accent)" }}
                onClick={() => {
                  const found = SAMPLE_LISTINGS.find(l => l.poster.name === convo.name);
                  if (found) setProfileView(found.poster);
                }}>{convo.name}</div>
              <div style={{ fontSize: 11, color: "var(--accent)", cursor: "pointer", textDecoration: "underline" }}
                onClick={() => {
                  const found = SAMPLE_LISTINGS.find(l => l.id === convo.listingId || l.title.includes(convo.listing?.split("—")[0]?.trim()));
                  if (found) setDetailListing(found);
                }}>
                Re: {convo.listing}
              </div>
            </div>
          </div>
          {/* Messages */}
          <div style={{ flex: 1, overflowY: "auto", display: "flex", flexDirection: "column", gap: 10, paddingBottom: 12 }}>
            {convo.msgs.map((m, i) => {
              const isMe = m.from === "You";
              return (
                <div key={i} style={{
                  alignSelf: isMe ? "flex-end" : "flex-start",
                  maxWidth: "80%"
                }}>
                  <div style={{
                    padding: "10px 14px", borderRadius: 18,
                    background: isMe ? "var(--accent)" : "var(--bg-elevated)",
                    color: isMe ? "white" : "var(--text-primary)",
                    fontSize: 14, lineHeight: 1.45,
                    borderBottomRightRadius: isMe ? 4 : 18,
                    borderBottomLeftRadius: isMe ? 18 : 4,
                  }}>
                    {m.text}
                  </div>
                  <div style={{
                    fontSize: 10, color: "var(--text-tertiary)", marginTop: 3,
                    textAlign: isMe ? "right" : "left", paddingLeft: 4, paddingRight: 4
                  }}>
                    {m.time}
                  </div>
                </div>
              );
            })}
          </div>
          {/* Input bar */}
          <div style={{
            position: "fixed", bottom: 90, left: "50%", transform: "translateX(-50%)",
            width: "100%", maxWidth: 430, padding: "10px 16px",
            background: "rgba(251,248,244,0.95)", backdropFilter: "blur(10px)",
            borderTop: "1px solid var(--border)", display: "flex", gap: 8, alignItems: "center",
            zIndex: 60
          }}>
            <input
              className="form-input" style={{ flex: 1, marginBottom: 0, padding: "12px 16px", fontSize: 15 }}
              placeholder="Type a message..."
              value={chatInput}
              onChange={e => setChatInput(e.target.value)}
              onKeyDown={e => {
                if (e.key === "Enter" && chatInput.trim()) {
                  setMessages(prev => [...prev, {
                    id: Date.now(), from: "You", to: openChat,
                    listingTitle: convo.listing,
                    text: chatInput.trim(), time: "Just now", read: true
                  }]);
                  setChatInput("");
                }
              }}
            />
            <button style={{
              width: 40, height: 40, borderRadius: "50%", border: "none",
              background: "var(--accent)", color: "white", cursor: "pointer",
              display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0
            }} onClick={() => {
              if (!chatInput.trim()) return;
              setMessages(prev => [...prev, {
                id: Date.now(), from: "You", to: openChat,
                listingTitle: convo.listing,
                text: chatInput.trim(), time: "Just now", read: true
              }]);
              setChatInput("");
            }}>{Icons.send({ size: 16 })}</button>
          </div>
        </div>
      );
    }

    // Conversations list
    return (
      <div className="page">
        <div className="page-title">Messages</div>
        <div className="page-subtitle">{convos.length} conversation{convos.length !== 1 ? "s" : ""}</div>
        {convos.length === 0 ? (
          <div className="empty-state">
            <div className="empty-state-icon">{Icons.chat({ size: 48 })}</div>
            <div className="empty-state-title">No messages yet</div>
            <p style={{ fontSize: 14 }}>Tap the message button on a listing to start a conversation</p>
          </div>
        ) : (
          convos.map((convo, ci) => {
            const lastMsg = convo.msgs[convo.msgs.length - 1];
            const initial = convo.name.split(" ").map(w => w[0]).join("");
            const hasUnread = convo.msgs.some(m => !m.read && m.from !== "You");
            return (
              <div key={ci} style={{
                display: "flex", gap: 12, padding: "14px 0",
                borderBottom: "1px solid var(--border)", cursor: "pointer"
              }} onClick={() => {
                // Mark all messages from this person as read
                setMessages(prev => prev.map(m => {
                  const other = m.from === "You" ? m.to : m.from;
                  if (other === convo.name && !m.read) return { ...m, read: true };
                  return m;
                }));
                setOpenChat(convo.name);
                setChatInput("");
              }}>
                <div className="poster-avatar" style={{ width: 48, height: 48, fontSize: 15 }}>{initial}</div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 2 }}>
                    <span style={{ fontWeight: 600, fontSize: 15 }}>{convo.name}</span>
                    <span style={{ fontSize: 11, color: "var(--text-tertiary)" }}>{lastMsg.time}</span>
                  </div>
                  <div style={{ fontSize: 12, color: "var(--accent)", marginBottom: 3 }}>Re: {convo.listing}</div>
                  <div style={{ fontSize: 13, color: "var(--text-secondary)", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                    {lastMsg.from === "You" ? "You: " : ""}{lastMsg.text}
                  </div>
                </div>
                {hasUnread && (
                  <div style={{ width: 10, height: 10, borderRadius: "50%", background: "var(--accent)", alignSelf: "center", flexShrink: 0 }} />
                )}
              </div>
            );
          })
        )}
      </div>
    );
  };

  return (
    <div className="app-shell">
      <style>{CSS}</style>
      
      {/* Header */}
      <div className="app-header">
        <div className="app-logo">Sublet<span>U</span></div>
        <div className="header-actions">
          <button className={`icon-btn ${view === "post" ? "active" : ""}`}
            onClick={() => setView(view === "post" ? "browse" : "post")}
            title="Post a new sublet listing">
            {Icons.plus({ size: 18 })}
          </button>
          <button className={`icon-btn ${view === "settings" ? "active" : ""}`}
            onClick={() => setView(view === "settings" ? "browse" : "settings")}>
            {Icons.filter({ size: 18 })}
          </button>
          <button className="icon-btn" onClick={() => showToast("No new notifications")}>
            {Icons.bell({ size: 18 })}
          </button>
        </div>
      </div>

      {/* Content */}
      {view === "browse" && renderBrowse()}
      {view === "map" && renderMap()}
      {view === "post" && renderPost()}
      {view === "messages" && renderMessages()}
      {view === "saved" && renderSaved()}
      {view === "settings" && renderSettings()}

      {/* Bottom Nav */}
      <div className="bottom-nav">
        {[
          { id: "browse", icon: Icons.home, label: "Browse" },
          { id: "map", icon: Icons.map, label: "Map" },
          { id: "messages", icon: Icons.chat, label: "Messages" },
          { id: "saved", icon: Icons.heart, label: "Saved" },
          { id: "settings", icon: Icons.settings, label: "Settings" },
        ].map(item => (
          <button key={item.id} className={`nav-item ${view === item.id ? "active" : ""}`}
            onClick={() => { setView(item.id); setMapSelection(null); }} title={item.label}>
            {item.icon({ size: 22 })}
            <span>{item.label}</span>
            <div className="nav-dot" />
          </button>
        ))}
      </div>

      {/* Detail Modal - inlined to prevent scroll reset */}
      {detailListing && (
        <div className="detail-overlay" onClick={() => setDetailListing(null)}>
          <div className="detail-sheet" onClick={e => e.stopPropagation()}>
            <div style={{ position: "relative" }}>
              <ListingImage listing={detailListing} className="detail-image" showControls={true} />
              <button onClick={() => setDetailListing(null)} style={{
                position: "absolute", top: 12, right: 12, width: 36, height: 36, borderRadius: "50%",
                background: "rgba(0,0,0,0.4)", color: "white", border: "none", cursor: "pointer",
                display: "flex", alignItems: "center", justifyContent: "center", zIndex: 20
              }}>{Icons.x({ size: 18 })}</button>
            </div>
            <div className="detail-body">
              <div className="detail-title">{detailListing.title}</div>
              <div className="detail-price">
                <div className="price-split-detail">
                  <span>{priceLabel(detailListing)}</span>
                </div>
                {roommates > 1 && <div className="split-tag">Split {roommates} ways</div>}
              </div>
              <div className="detail-section">
                <div className="detail-section-title">Details</div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                  <div className="meta-item"><strong>{detailListing.bedrooms}</strong>&nbsp;{detailListing.bedrooms === 1 ? "Bedroom" : "Bedrooms"}</div>
                  <div className="meta-item"><strong>{detailListing.bathrooms}</strong>&nbsp;{detailListing.bathrooms === 1 ? "Bathroom" : "Bathrooms"}</div>
                  <div className="meta-item"><strong>{detailListing.rooms}</strong>&nbsp;Rooms</div>
                  <div className="meta-item"><strong>{detailListing.distance}</strong>&nbsp;mi from campus</div>
                  <div className="meta-item" style={{ gridColumn: "1 / -1" }}>
                    <span className="rooms-available">{detailListing.availableRooms} room{detailListing.availableRooms !== 1 ? "s" : ""} available</span>
                  </div>
                </div>
              </div>
              <div className="detail-section">
                <div className="detail-section-title">About</div>
                <p style={{ fontSize: 14, lineHeight: 1.6, color: "var(--text-secondary)" }}>{detailListing.description}</p>
              </div>
              <div className="detail-section">
                <div className="detail-section-title">Available</div>
                <p style={{ fontSize: 14, color: "var(--text-secondary)" }}>{detailListing.available}</p>
              </div>
              <div className="detail-section">
                <div className="detail-section-title">Amenities</div>
                <div className="chip-grid">
                  {detailListing.amenities.map(a => (
                    <span key={a} className="amenity-chip">{a}</span>
                  ))}
                </div>
              </div>
              <div className="detail-section">
                <div className="detail-section-title">Listed by</div>
                <div className="card-poster" style={{ borderTop: "none", paddingTop: 0, cursor: "pointer" }}
                  onClick={() => setProfileView(detailListing.poster)}>
                  <div className="poster-avatar">{detailListing.poster.avatar}</div>
                  <div className="poster-info">
                    <div className="poster-name" style={{ color: "var(--accent)", textDecoration: "underline" }}>
                      {detailListing.poster.name}
                      {detailListing.poster.verified && <span className="verified-badge">✓</span>}
                    </div>
                    <div className="poster-detail">
                      <span>{detailListing.poster.university}</span>
                      <span>★ {detailListing.poster.rating} ({detailListing.poster.reviews})</span>
                    </div>
                  </div>
                </div>
              </div>
              <div style={{ display: "flex", gap: 10, marginTop: 8 }}>
                <button className="btn-primary" style={{ flex: 1 }} onClick={() => {
                  setMsgCompose({ listing: detailListing });
                  setCustomMsgInput("");
                }}>Message</button>
                <button className="btn-secondary" style={{ flex: 1 }} onClick={() => {
                  if (!savedListings.find(l => l.id === detailListing.id)) {
                    setSavedListings(prev => [...prev, detailListing]);
                    showToast("Saved!");
                  }
                  setDetailListing(null);
                }}>Save</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* Profile Modal */}
      {profileView && (
        <div className="detail-overlay" onClick={() => setProfileView(null)} style={{ zIndex: 300 }}>
          <div style={{
            position: "absolute", bottom: 0, left: 0, right: 0,
            background: "var(--bg-card)", borderRadius: "22px 22px 0 0",
            padding: "28px 24px 36px", maxHeight: "70vh", overflowY: "auto",
            boxShadow: "var(--shadow-xl)", animation: "sheetUp 0.3s ease"
          }} onClick={e => e.stopPropagation()}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 20 }}>
              <div style={{ display: "flex", gap: 16, alignItems: "center" }}>
                <div className="poster-avatar" style={{ width: 56, height: 56, fontSize: 19 }}>{profileView.avatar}</div>
                <div>
                  <div style={{ fontWeight: 700, fontSize: 20, fontFamily: "var(--font-display)" }}>
                    {profileView.name}
                    {profileView.verified && <span className="verified-badge" style={{ marginLeft: 6 }}>✓</span>}
                  </div>
                  <div style={{ fontSize: 13, color: "var(--text-secondary)", marginTop: 2 }}>{profileView.university}</div>
                  <div style={{ fontSize: 13, color: "var(--accent)", marginTop: 2 }}>★ {profileView.rating} · {profileView.reviews} reviews</div>
                </div>
              </div>
              <button className="icon-btn" onClick={() => setProfileView(null)}>{Icons.x({ size: 16 })}</button>
            </div>
            {profileView.bio && (
              <div style={{ marginBottom: 16 }}>
                <div style={{ fontSize: 12, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.5, color: "var(--text-tertiary)", marginBottom: 6 }}>About</div>
                <p style={{ fontSize: 14, lineHeight: 1.6, color: "var(--text-secondary)" }}>{profileView.bio}</p>
              </div>
            )}
            <div style={{ marginBottom: 16 }}>
              <div style={{ fontSize: 12, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.5, color: "var(--text-tertiary)", marginBottom: 8 }}>Verification</div>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                {[".edu Email", "Student ID", "Phone"].map(v => (
                  <span key={v} style={{ fontSize: 12, padding: "4px 10px", borderRadius: 10, background: "var(--success-light)", color: "var(--success)", fontWeight: 600 }}>✓ {v}</span>
                ))}
              </div>
            </div>
            <div>
              <div style={{ fontSize: 12, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.5, color: "var(--text-tertiary)", marginBottom: 8 }}>Listings</div>
              {SAMPLE_LISTINGS.filter(l => l.poster.name === profileView.name).map(l => (
                <div key={l.id} style={{
                  padding: "10px 0", borderBottom: "1px solid var(--border)", cursor: "pointer"
                }} onClick={() => { setProfileView(null); setDetailListing(l); }}>
                  <div style={{ fontWeight: 600, fontSize: 14 }}>{l.title}</div>
                  <div style={{ fontSize: 12, color: "var(--text-secondary)" }}>{l.address} · ${getEffectivePrice(l)}{getPriceSuffix(l)}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* Message Compose Modal */}
      {msgCompose && (() => {
        const { listing } = msgCompose;
        const defText = defaultMsgText(listing);
        return (
          <div className="detail-overlay" onClick={() => setMsgCompose(null)} style={{ zIndex: 350 }}>
            <div style={{
              position: "absolute", bottom: 0, left: 0, right: 0,
              background: "var(--bg-card)", borderRadius: "22px 22px 0 0",
              padding: "24px 20px 32px", maxHeight: "70vh", overflowY: "auto",
              boxShadow: "var(--shadow-xl)", animation: "slideUp 0.3s ease"
            }} onClick={e => e.stopPropagation()}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                <div>
                  <div style={{ fontWeight: 700, fontSize: 17, fontFamily: "var(--font-display)" }}>Message {listing.poster.name}</div>
                  <div style={{ fontSize: 12, color: "var(--accent)", marginTop: 2 }}>Re: {listing.title}</div>
                </div>
                <button className="icon-btn" onClick={() => setMsgCompose(null)}>{Icons.x({ size: 16 })}</button>
              </div>

              {/* Default message option */}
              <div style={{
                padding: "14px 16px", borderRadius: "var(--radius-md)",
                border: "1.5px solid var(--border)", marginBottom: 10, cursor: "pointer",
                transition: "all 0.15s"
              }}
                onMouseEnter={e => { e.currentTarget.style.borderColor = "var(--accent)"; e.currentTarget.style.background = "var(--accent-light)"; }}
                onMouseLeave={e => { e.currentTarget.style.borderColor = "var(--border)"; e.currentTarget.style.background = "transparent"; }}
                onClick={() => {
                  sendMessage(listing, defText);
                  setMsgCompose(null);
                }}>
                <div style={{ fontSize: 11, fontWeight: 600, color: "var(--accent)", marginBottom: 6, textTransform: "uppercase", letterSpacing: 0.5 }}>Quick Message</div>
                <div style={{ fontSize: 14, color: "var(--text-secondary)", lineHeight: 1.4 }}>{defText}</div>
              </div>

              {/* Custom message */}
              <div style={{ marginTop: 14 }}>
                <div style={{ fontSize: 11, fontWeight: 600, color: "var(--text-tertiary)", marginBottom: 8, textTransform: "uppercase", letterSpacing: 0.5 }}>Or write your own</div>
                <textarea
                  className="form-input"
                  rows={3}
                  placeholder="Type your message..."
                  value={customMsgInput}
                  onChange={e => setCustomMsgInput(e.target.value)}
                  style={{ resize: "vertical", fontSize: 14, marginBottom: 12 }}
                />
                <button className="btn-primary" style={{ width: "100%" }} onClick={() => {
                  if (!customMsgInput.trim()) return;
                  sendMessage(listing, customMsgInput.trim());
                  setMsgCompose(null);
                  setCustomMsgInput("");
                }}>
                  Send Custom Message
                </button>
              </div>
            </div>
          </div>
        );
      })()}

      {reportListing && (
        <div className="detail-overlay" onClick={() => { setReportListing(null); setReportReason(""); setReportMessage(""); }}>
          <div className="detail-sheet" style={{ maxHeight: "70vh", padding: 24, overflowY: "auto" }} onClick={e => e.stopPropagation()}>
            <div style={{ fontFamily: "var(--font-display)", fontSize: 20, fontWeight: 600, marginBottom: 8 }}>Report Listing</div>
            <div style={{ fontSize: 14, color: "var(--text-secondary)", marginBottom: 16 }}>
              Help keep SubletU safe. What's wrong with <strong>{reportListing.title}</strong>?
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 16 }}>
              {["Fraudulent or fake listing", "Incorrect information", "Already rented/unavailable", "Inappropriate content", "Spam", "Other"].map(reason => (
                <button key={reason} onClick={() => setReportReason(reason)}
                  style={{
                    padding: "12px 16px", borderRadius: "var(--radius-md)", textAlign: "left",
                    border: `1.5px solid ${reportReason === reason ? "var(--danger)" : "var(--border)"}`,
                    background: reportReason === reason ? "var(--danger-light)" : "var(--bg-card)",
                    color: reportReason === reason ? "var(--danger)" : "var(--text-primary)",
                    fontFamily: "var(--font-body)", fontSize: 14, cursor: "pointer", fontWeight: reportReason === reason ? 600 : 400
                  }}>{reason}</button>
              ))}
            </div>
            <div style={{ marginBottom: 20 }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: "var(--text-secondary)", textTransform: "uppercase", letterSpacing: "0.5px", marginBottom: 8 }}>
                Additional details (optional)
              </div>
              <textarea className="form-input" rows={3}
                placeholder="Tell us more about why this listing seems fraudulent..."
                value={reportMessage}
                onChange={e => setReportMessage(e.target.value)}
                style={{ resize: "none" }}
              />
            </div>
            <div style={{ display: "flex", gap: 10 }}>
              <button className="btn-secondary" style={{ width: "auto", padding: "12px 20px" }}
                onClick={() => { setReportListing(null); setReportReason(""); setReportMessage(""); }}>
                Cancel
              </button>
              <button className="btn-primary" style={{ background: "var(--danger)" }}
                onClick={() => {
                  if (!reportReason) { showToast("Please select a reason"); return; }
                  showToast("✅ Report submitted — thank you!");
                  setReportListing(null); setReportReason(""); setReportMessage("");
                  handleActionBtn("pass");
                }}>Submit Report</button>
            </div>
          </div>
        </div>
      )}

      {/* Toast */}
      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));root.render(React.createElement(SubletApp));</script></body></html>
